name: 手动构建未签名 IPA

# 在 Actions 页点 "Run workflow" 触发。
# 产出未签名 ipa，下载后用 Sideloadly / AltStore 自签安装（无需 Apple 开发者账号）。
on:
  workflow_dispatch:

jobs:
  build-ipa:
    name: 构建未签名 IPA
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 显示 Xcode 版本
        run: xcodebuild -version

      - name: 构建未签名 .app
        run: |
          xcodebuild \
            -project ios-app/flux.xcodeproj \
            -target flux \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: 打包成 IPA
        run: |
          APP_DIR="build/Build/Products/Release-iphoneos"
          cd "$APP_DIR"
          mkdir -p Payload
          cp -R flux.app Payload/
          zip -qr flux-unsigned.ipa Payload
          ls -lh flux-unsigned.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: flux-unsigned-ipa
          path: build/Build/Products/Release-iphoneos/flux-unsigned.ipa
          if-no-files-found: error
