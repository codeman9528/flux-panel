name: 发布节点安装资产 (gost + install.sh)

# 编译 gost 节点端二进制，连同安装脚本/配置一起发布到 1.4.3 release，
# 供面板"添加节点"时显示的安装命令下载（不再依赖原作者仓库）。
on:
  workflow_dispatch:

jobs:
  build-and-release:
    name: 编译 gost 并发布 release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 编译 gost 二进制 (amd64 + arm64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../gost-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../gost-arm64
          ls -lh ../gost-amd64 ../gost-arm64

      - name: 发布到 1.4.3 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 重建 1.4.3 release（先删旧的，避免资产冲突）
          gh release delete 1.4.3 --yes --cleanup-tag 2>/dev/null || true
          gh release create 1.4.3 \
            --title "节点安装资产 1.4.3" \
            --notes "节点端 gost 二进制 + 安装脚本（供面板添加节点时下载）" \
            gost-amd64 \
            gost-arm64 \
            install.sh \
            panel_install.sh \
            gost.sql \
            docker-compose-v4.yml \
            docker-compose-v6.yml
