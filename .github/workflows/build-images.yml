name: 手动构建并推送镜像 (GHCR)

# 在 GitHub 仓库的 Actions 页面点 "Run workflow" 即可触发构建。
# 镜像推送到 GitHub 自带的容器仓库 GHCR，使用内置 GITHUB_TOKEN，无需任何额外密钥。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如 latest 或 1.5.0)'
        required: true
        default: 'latest'
      platforms:
        description: '目标架构 (服务器为 x86 用 linux/amd64；ARM 服务器用 linux/arm64)'
        required: true
        default: 'linux/amd64'

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flux-backend
            context: ./springboot-backend
          - name: flux-frontend
            context: ./vite-frontend
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 仓库 owner 转小写 (GHCR 要求全小写)
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.owner }}/${{ matrix.name }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
